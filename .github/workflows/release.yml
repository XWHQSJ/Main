name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Rename JAR with version
        id: jar
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SRC=$(ls build/libs/zhihu-crawler-*-all.jar | head -1)
          DEST="build/libs/zhihu-crawler-${VERSION}.jar"
          cp "$SRC" "$DEST"
          echo "jar_path=${DEST}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.jar_path }}
          generate_release_notes: true
          body: |
            ## Usage

            ```bash
            java -jar zhihu-crawler-${{ steps.jar.outputs.version }}.jar --help
            java -jar zhihu-crawler-${{ steps.jar.outputs.version }}.jar hackernews --output hn.json --format json
            ```

            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.jar.outputs.version }}
            ```
